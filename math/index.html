      tex: {

      }

<body class="h-100 d-flex flex-column">

  <main class="flex-shrink-0 container mt-5">
    <nav class="navbar navbar-expand-lg navbar-themed">

  <a class="navbar-brand" href="../index.html"><h5><b>Jack Rosetti</b></h5></a>

  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
    <i class="fas fa-1x fa-bars text-themed"></i>
  </button>

  <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
    <div class="navbar-nav ml-auto">
      <a class="nav-item nav-link" href="../files/Rosetti_Resume.pdf">CV</a>

      <a class="nav-item nav-link" href="../about/index.html">About</a>
      <span id="theme-toggler" class="nav-item nav-link" role="button" onclick="toggleTheme()"></span>
    </div>
  </div>

</nav>

    <div class="col-lg-10 mx-auto mt-5 daily-math" data-daily-math>

      <div class="daily-math__header wow animated fadeIn" data-wow-delay=".05s">
        <div>
          <p class="section-label">Hidden Daily Math</p>
          <h1>Daily Problem Bank</h1>
        </div>
        <div class="daily-math__date" data-math-date></div>
      </div>

      <div class="problem-switcher" role="tablist" aria-label="Problem type">
        <button class="problem-switcher__button" type="button" role="tab" data-problem-type-option="integral">Integral</button>
        <button class="problem-switcher__button" type="button" role="tab" data-problem-type-option="diffeq">Diff Eq</button>
        <button class="problem-switcher__button" type="button" role="tab" data-problem-type-option="real-analysis">Real Analysis</button>
        <button class="problem-switcher__button" type="button" role="tab" data-problem-type-option="stats-proof">Stats Proof</button>
      </div>

      <div class="daily-math__grid wow animated fadeIn" data-wow-delay=".1s">
        <section class="daily-problem" data-problem-card>
          <div class="daily-problem__topline">
            <span data-problem-type-label></span>
            <span data-problem-index></span>
          </div>
          <div class="daily-problem__topic" data-problem-topic></div>
          <div class="daily-problem__prompt" data-problem-prompt></div>
          <div class="daily-problem__actions">
            <button class="btn btn-sm btn-outline-primary" type="button" data-solution-toggle aria-expanded="false">Show solution</button>
            <button class="btn btn-sm btn-outline-secondary" type="button" data-random-problem>Another</button>
          </div>
          <div class="daily-problem__solution" data-problem-solution hidden>
            <p data-problem-method></p>
            <div data-problem-answer></div>
          </div>
        </section>
      </div>

      <div class="daily-math__bank" data-bank-counts></div>

    </div>

  </main>

  <footer class="mt-auto py-3 text-center">

  <div class="container-fluid justify-content-center">

       onMouseOut="this.style.color='#6c757d'">

</footer>
